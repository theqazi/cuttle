[package]
name = "cuttle-cli"
version = "0.0.15"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "Cuttle top-level CLI binary. v0.0.15 wires cuttle-sandbox into the CLI: cuttle sandbox profile + cuttle sandbox run. Tool dispatch from the model loop still deferred (v0.0.16+); these subcommands give the operator direct access to the sandbox primitive for testing."

[[bin]]
name = "cuttle"
path = "src/main.rs"

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
dirs.workspace = true
tokio.workspace = true
futures-util.workspace = true
sha2.workspace = true
rand.workspace = true
chrono.workspace = true
cuttle-audit = { path = "../cuttle-audit" }
cuttle-telemetry = { path = "../cuttle-telemetry" }
cuttle-credential = { path = "../cuttle-credential" }
cuttle-anthropic = { path = "../cuttle-anthropic" }
cuttle-sandbox = { path = "../cuttle-sandbox" }

[dev-dependencies]
tempfile.workspace = true
