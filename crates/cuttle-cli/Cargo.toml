[package]
name = "cuttle-cli"
version = "0.0.11"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "Cuttle top-level CLI binary. v0.0.11 wires the cuttle telemetry subcommand. Interactive REPL + cuttle config init deferred to v0.0.12+ once cuttle-anthropic streaming lands."

[[bin]]
name = "cuttle"
path = "src/main.rs"

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
dirs.workspace = true
cuttle-audit = { path = "../cuttle-audit" }
cuttle-telemetry = { path = "../cuttle-telemetry" }

[dev-dependencies]
tempfile.workspace = true
