[package]
name = "cuttle-cli"
version = "0.0.13"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "Cuttle top-level CLI binary. v0.0.13 adds cuttle audit verify (HMAC chain integrity check) over cuttle_audit::verify_chain. cuttle session start multi-turn REPL deferred to v0.0.14+ once new AuditEvent variants for conversation turns land."

[[bin]]
name = "cuttle"
path = "src/main.rs"

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
dirs.workspace = true
tokio.workspace = true
futures-util.workspace = true
cuttle-audit = { path = "../cuttle-audit" }
cuttle-telemetry = { path = "../cuttle-telemetry" }
cuttle-credential = { path = "../cuttle-credential" }
cuttle-anthropic = { path = "../cuttle-anthropic" }

[dev-dependencies]
tempfile.workspace = true
